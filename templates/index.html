<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Parking Dashboard{% endblock %}</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  
  <!-- Optional: your custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  {% block head %}{% endblock %}
</head>

<body class="bg-light">

  <div class="container my-5">
    <header class="text-center mb-5">
      <h1 class="display-4 fw-bold">Campus Parking Dashboard</h1>
      <p class="lead text-muted">Live occupancy overview • Updates every 5 seconds</p>
    </header>

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS (for any interactive parts later) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script>
    window.apiLotsUrl = "{{ url_for('api_lots') }}";
  </script>
  <!-- Dashboard functionality -->
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
