<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Parking Dashboard{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Optional: your custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

  {% block head %}{% endblock %}
</head>
<body class="bg-light">

  <div class="container my-5">
    <header class="text-center mb-5">
      <h1 class="display-4 fw-bold">Campus Parking Dashboard</h1>
      <p class="lead text-muted">Live occupancy overview • Updates every 5 seconds</p>
    </header>

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS (for any interactive parts later) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
  function updateDashboard() {
    fetch("{{ url_for('api_lots') }}")
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("lots-container");
        if (!container) return;

        let html = "";
        if (data.lots.length === 0) {
          html = `<div class="col-12"><div class="alert alert-info text-center">No parking lots found.</div></div>`;
        } else {
          data.lots.forEach(lot => {
            const barClass = lot.percent < 60 ? 'bg-success' :
                            lot.percent <= 85 ? 'bg-warning' : 'bg-danger';
            
            html += `
              <div class="col">
                <div class="card h-100 shadow-sm border-0">
                  <div class="card-body">
                    <h5 class="card-title fw-bold">${lot.name}</h5>
                    <div class="mb-3">
                      <div class="d-flex justify-content-between mb-1 small">
                        <span>Occupied: <strong>${lot.occupancy}</strong></span>
                        <span>Available: <strong>${lot.available}</strong></span>
                      </div>
                      <div class="progress" role="progressbar" aria-label="Occupancy" 
                           aria-valuenow="${lot.percent}" aria-valuemin="0" aria-valuemax="100" style="height: 1.5rem;">
                        <div class="progress-bar ${barClass} fw-bold" style="width: ${lot.percent}%">
                          ${lot.percent}%
                        </div>
                      </div>
                    </div>
                    <div class="text-muted small">Capacity: ${lot.capacity} spaces</div>
                  </div>
                </div>
              </div>
            `;
          });
        }

        container.innerHTML = html;

        // Also update timestamp if you have it
        const timeEl = document.getElementById("last-updated");
        if (timeEl) timeEl.textContent = data.now;
      })
      .catch(err => console.error("Dashboard update failed:", err));
  }

  // Run immediately, then every 20 seconds
  document.addEventListener("DOMContentLoaded", () => {
    updateDashboard();                // initial load
    setInterval(updateDashboard, 5000);  // every 20 seconds
  });
</script>
</body>
</html>
