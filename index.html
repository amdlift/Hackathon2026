<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAH Parking Lot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- <header>
            <h1>🚗 Parking Lot Management Dashboard</h1>
            <p>Real-time occupancy monitoring across all facilities</p>
        </header> -->

        <!-- <div class="controls">
            <button id="refresh-btn" class="refresh-button">🔄 Refresh Data</button>
        </div> -->

        <main class="parking-grid" id="parkingGrid">
            <!-- Parking lot cards will be dynamically inserted here -->
        </main>
    </div>

    <script>
        // Sample parking lot data - this would eventually come from your Python backend
        const parkingLots = [
            {
                lot_name: "A1",
                max_occupancy: 100,
                current_occupancy: 25,
                description: "Main entrance parking area with easy access to building"
            },
            {
                lot_name: "B2",
                max_occupancy: 80,
                current_occupancy: 75,
                description: "Secondary lot near the south wing entrance"
            },
            {
                lot_name: "C3",
                max_occupancy: 150,
                current_occupancy: 145,
                description: "Large parking structure with covered spaces"
            },
            {
                lot_name: "D4",
                max_occupancy: 60,
                current_occupancy: 30,
                description: "Compact lot for staff and visitors"
            },
            {
                lot_name: "E5",
                max_occupancy: 200,
                current_occupancy: 180,
                description: "Premium parking with electric vehicle charging stations"
            },
            {
                lot_name: "F6",
                max_occupancy: 75,
                current_occupancy: 15,
                description: "Overflow parking area for special events"
            }
        ];

        function calculateOccupancyPercentage(current, max) {
            return Math.round((current / max) * 100);
        }

        function getOccupancyStatus(percentage) {
            if (percentage <= 30) return 'low';
            if (percentage <= 70) return 'medium';
            return 'high';
        }

        function sampleColorFromGradient(percentage) {
            // 3-point gradient: Green (0%) → Yellow (50%) → Red (100%)
            const green = { r: 39, g: 174, b: 96 };   // #27ae60
            const yellow = { r: 243, g: 156, b: 18 }; // #f39c12
            const red = { r: 231, g: 76, b: 60 };     // #e74c3c
            
            let color;
            
            if (percentage <= 50) {
                // Interpolate between green and yellow
                const ratio = percentage / 50;
                color = {
                    r: Math.round(green.r + (yellow.r - green.r) * ratio),
                    g: Math.round(green.g + (yellow.g - green.g) * ratio),
                    b: Math.round(green.b + (yellow.b - green.b) * ratio)
                };
            } else {
                // Interpolate between yellow and red
                const ratio = (percentage - 50) / 50;
                color = {
                    r: Math.round(yellow.r + (red.r - yellow.r) * ratio),
                    g: Math.round(yellow.g + (red.g - yellow.g) * ratio),
                    b: Math.round(yellow.b + (red.b - yellow.b) * ratio)
                };
            }
            
            return `rgb(${color.r}, ${color.g}, ${color.b})`;
        }
        
        function getCardBackgroundGradient(sampledColor) {
            // Create gradient from white at top to sampled color at bottom
            // Convert rgb(r, g, b) to rgba(r, g, b, 0.8)
            const rgbaColor = sampledColor.replace('rgb(', 'rgba(').replace(')', ', 0.8)');
            return `linear-gradient(to bottom, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.7) 30%, ${rgbaColor} 100%)`;
        }

        function createParkingCard(lot) {
            const percentage = calculateOccupancyPercentage(lot.current_occupancy, lot.max_occupancy);
            const status = getOccupancyStatus(percentage);
            const sampledColor = sampleColorFromGradient(percentage);
            const cardBackground = getCardBackgroundGradient(sampledColor);

            return `
                <div class="parking-card" data-status="${status}" style="background: ${cardBackground};">
                    <div class="card-header">
                        <h2 class="lot-name">Lot ${lot.lot_name}</h2>
                        <div class="occupancy-badge" style="background: ${sampledColor};">
                            ${percentage}%
                        </div>
                    </div>
                    
                    <div class="card-content">
                        <p class="description">${lot.description}</p>
                        
                        <div class="occupancy-details">
                            <div class="occupancy-bar">
                                <div class="occupancy-fill" style="width: ${percentage}%; background: ${sampledColor};"></div>
                            </div>
                            
                            <div class="occupancy-numbers">
                                <span class="current">${lot.current_occupancy}</span>
                                <span class="separator">/</span>
                                <span class="max">${lot.max_occupancy}</span>
                                <span class="label">spaces</span>
                            </div>
                        </div>
                        
                        <div class="available-spaces">
                            <span class="available-number">${lot.max_occupancy - lot.current_occupancy}</span>
                            <span class="available-label">spaces available</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderParkingLots() {
            const grid = document.getElementById('parkingGrid');
            grid.innerHTML = parkingLots.map(lot => createParkingCard(lot)).join('');
        }

        function refreshData() {
            // Simulate data refresh - in real implementation, this would fetch from your Python backend
            parkingLots.forEach(lot => {
                // Simulate some occupancy changes
                const change = Math.floor(Math.random() * 11) - 5; // Random change between -5 and +5
                lot.current_occupancy = Math.max(0, Math.min(lot.max_occupancy, lot.current_occupancy + change));
            });
            
            renderParkingLots();
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderParkingLots();
            
            // Add refresh button functionality only if button exists
            const refreshBtn = document.getElementById('refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', refreshData);
            }
            
            // Auto-refresh every 30 seconds
            setInterval(refreshData, 30000);
        });
    </script>
</body>
</html>
